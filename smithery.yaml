# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - apiToken
    properties:
      apiToken:
        type: string
        description: >
          Bearer token for Platinumlist API authorization.
          Contact Platinumlist to get your API token.
      apiBaseUrl:
        type: string
        description: >
          Base URL of the Platinumlist API.
          Default: https://api.platinumlist.net/v/7
        default: "https://api.platinumlist.net/v/7"
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@platinumlist/mcp-server'],
      env: {
        API_TOKEN: config.apiToken,
        API_BASE_URL: config.apiBaseUrl ?? 'https://api.platinumlist.net/v/7'
      }
    })
