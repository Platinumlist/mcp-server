# =============================================================================
# docker-compose.yml — MCP Server Events
#
# Services:
#   dev         — development with hot reload, no local npm required
#   build       — one-time production image build
#   inspector   — visual tool testing in browser
# =============================================================================

services:

  # ── DEV: development with hot reload ───────────────────────────────────────
  # Run:  docker compose up dev
  #
  # What happens:
  # - Mounts src/ from your machine into the container
  # - tsx watch automatically restarts server on changes
  # - node_modules live ONLY inside the container — not on host machine
  dev:
    build:
      context: .
      target: deps          # use stage with devDependencies
    image: mcp-server-events:dev
    container_name: mcp-events-dev

    # Read API_BASE_URL and API_TOKEN from .env file
    env_file:
      - .env

    # Mount src/ — code changes are immediately visible in container.
    # node_modules are NOT mounted — they exist only inside container.
    volumes:
      - ./src:/app/src:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      # Named volume for node_modules — isolated from host
      - node_modules_cache:/app/node_modules

    # tsx watch = hot reload on file changes
    command: [ "npx", "tsx", "watch", "src/index.ts" ]

    # MCP runs via stdin/stdout — required!
    stdin_open: true
    tty: true

    restart: unless-stopped


  # ── BUILD: build production image ──────────────────────────────────────────
  # Run:  docker compose run --rm build
  #
  # Compiles TypeScript and creates production image.
  # Use before publishing or deployment.
  build:
    build:
      context: .
      target: production
    image: mcp-server-events:latest
    container_name: mcp-events-build

    env_file:
      - .env

    stdin_open: true
    tty: true


  # ── INSPECTOR: test tools in browser ───────────────────────────────────────
  # Run:  docker compose up inspector
  # Then: open http://localhost:5173 in browser
  #
  # Lets you manually call search_events and get_event
  # and inspect server responses without Claude Desktop.
  inspector:
    build:
      context: .
      target: deps
    image: mcp-server-events:dev
    container_name: mcp-events-inspector

    env_file:
      - .env

    # Make inspector listen on 0.0.0.0 so ports are accessible from Windows host
    environment:
      - CLIENT_PORT=6274
      - SERVER_PORT=6277
      - HOST=0.0.0.0

    volumes:
      - ./src:/app/src:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - node_modules_cache:/app/node_modules

    command: >
      sh -c "npx --yes @modelcontextprotocol/inspector npx tsx src/index.ts"

    ports:
      - "6274:6274"
      - "6277:6277"

    stdin_open: true
    tty: true


# Named volume for node_modules.
# Key idea: dependencies are stored in Docker volume,
# not in your local project folder.
volumes:
  node_modules_cache: